@if(isAddingTask){
    <!-- <app-new-task [userId]="userId" (cancel)="onCancelAddTask()" (add)="onAddTask($event)"/> -->
      <app-new-task [userId]="userId" (cancel)="onCloseAddTask()"/>
}
<section id="tasks"> 
    <header>
        <h2>{{name}}'s Tasks</h2>
        <menu>
            <button (click)="onStartAddTask()">Add Task</button>
        </menu>
     </header>
     <ul>
        @for (t of selectedUserTasks; track t.id){
        <li>
            <app-task [task]="t" (complete)="onCompleteTask($event)"/>
        </li>
    }
        

     </ul>
</section>
